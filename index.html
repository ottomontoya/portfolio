        <h1>Otto Montoya — Data Analyst</h1>
        <p>Clear insights from complex data. End-to-end across the BI stack.</p>
        <p>
          I'm a Data Analyst with a Bachelor's in Informatics Engineering and Digital Business.
          I specialize in Tableau and Amazon QuickSight, and I've built interactive reporting and
          internal tools with Retool across e-commerce, education, non-profit, energy, and cybersecurity.
          From understanding business questions and defining KPIs, to designing dashboards, to building
          the governance models that keep data secure and trustworthy.
        </p>
        <ul>
          <li>696 → 12 access paths consolidated for one Tableau deployment</li>
          <li>5 industries served: cybersecurity, automotive, non-profit, energy, SaaS</li>
          <li>~15 legacy dashboards rebuilt for a global manufacturer</li>
          <li>3+ years end-to-end BI, from KPI to delivery</li>
        </ul>

        <h2>Skills</h2>
        <ul>
          <li>BI &amp; Visualization: Tableau, Tableau Online, Amazon QuickSight, Power BI</li>
          <li>Data &amp; Cloud: Snowflake, Amazon Athena, Amazon S3, Neon, Azure ETL</li>
          <li>Dev &amp; Workflow: Retool, SQL, Python, Pandas, Jupyter, dbt, ETL pipelines</li>
          <li>Supporting: Excel-based BI, Laravel / PHP, Dashboard embedding, Tableau Extensions</li>
        </ul>

        <h2>Projects</h2>

        <article>
          <h3>Governed Data Access at Scale — Cybersecurity SaaS</h3>
          <p>Role: Data Analyst &amp; BI Specialist | Tools: Tableau, Snowflake, dbt | 1 year</p>
          <p>Redesigned row-level security in Tableau, reducing 696 access paths to 12 maintainable rules and eliminating all risky data sources. Restructured ~30 team folders into 5 global, access-regulated folders. Built admin monitoring dashboards reducing admin workload ~70%.</p>
          <p>Impact: 696 → 12 access paths. 100% risky data sources removed. ~70% reduction in admin workload.</p>
        </article>

        <article>
          <h3>Market Research Dashboards for a Global Automotive Manufacturer</h3>
          <p>Role: BI Developer | Tools: Tableau | 6 months</p>
          <p>Built the Tableau visualization layer of a custom market research analytics platform, delivering ~15 dashboards from sketch-based designs that surface customer insights by market segment. Dashboards embedded into the client's internal portal enabling cross-tabulation and longitudinal analysis.</p>
          <p>Case study: https://www.stxnext.com/case-study/market-research-platform</p>
        </article>

        <article>
          <h3>BI Layer for an Open Source Foundation's Salesforce Migration</h3>
          <p>Role: BI Consultant | Tools: Amazon QuickSight, Snowflake | 3 months</p>
          <p>Designed and built three QuickSight dashboards on a Snowflake-backed data layer covering CRM, web analytics, and GitHub community activity — all redesigned from scratch as part of the client's move off Salesforce reporting. Three data sources unified in a single controlled BI environment.</p>
          <p>Case study: https://www.stxnext.com/case-study/salesforce-optimization</p>
        </article>

        <article>
          <h3>Revenue Reporting &amp; Workflow Apps for an Energy Company</h3>
          <p>Role: BI &amp; Workflow Applications Developer | Tools: Amazon QuickSight, Retool, AWS | Ongoing</p>
          <p>Built revenue reporting dashboards in QuickSight and interactive Retool workflow apps with dynamic fields, conditional logic, and validation rules to automate manual processes and improve data quality.</p>
        </article>

        <article>
          <h3>Rationalized BI for an Email Client Product Team</h3>
          <p>Role: BI Consultant | Tools: Amazon QuickSight, Neon, Salesforce | 3 months</p>
          <p>Standardized a fragmented Salesforce reporting landscape by introducing QuickSight and consolidating many overlapping dashboards into flexible KPI views with daily-to-yearly time-range switching. Delivered full QuickSight structure for a company-wide rollout.</p>
        </article>

        <article>
          <h3>Real-Time Manufacturing Analytics for a Global Heavy Industry Manufacturer</h3>
          <p>Role: BI Developer | Tools: Amazon QuickSight | 3 weeks</p>
          <p>Implemented a four-view real-time manufacturing analytics suite in AWS QuickSight from production design mockups, covering furnace process monitoring and a 2,000+ asset rotating equipment fleet with conditional formatting, interactive filtering, and cross-view drill-down navigation.</p>
        </article>
